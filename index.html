<!DOCTYPE html>
<html>

<head>
	<title>Educagame - Mata Mosquito</title>
	<meta charset="utf-8">

	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

	<link rel="stylesheet" href="estilo.css" />

	<script>

		function iniciarJogo() {

			var aluno = document.getElementById('aluno').value
			var ra = document.getElementById('ra').value
			var turma = document.getElementById('turma').value
			var nivel = document.getElementById('nivel').value

			if (aluno === '' || ra === '' || turma === '') {
				alert('Informe o nome, RA e turma do aluno')
				return false
			}

			if (nivel === '') {
				alert('Selecione um nível para iniciar o jogo')
				return false
			}

			// salva no navegador
			localStorage.setItem("aluno", aluno)
			localStorage.setItem("ra", ra)
			localStorage.setItem("turma", turma)
			//localStorage.setItem("ano", ano)

			// inicia o jogo
			window.location.href = "app.html?" + nivel

		}

	</script>

</head>

<body>

	<div class="container">

		<div class="row">
			<div class="col">
				<div class="d-flex justify-content-center">
					<img src="imagens/game.png" />
				</div>
			</div>
		</div>

		<br>

		<div class="row">
			<div class="col">

				<div class="d-flex justify-content-center">

					<div class="mb-2">

						<input type="text" class="form-control" id="aluno" placeholder="Nome do aluno">

						<br>

						<input type="text" class="form-control" id="ra" placeholder="RA do aluno">

						<br>

						<input type="text" class="form-control" id="turma" placeholder="Turma do aluno">

						<br>

						<select class="form-control" id="nivel">
							<option value="">-- Selecione o nível --</option>
							<option value="facil">Fácil</option>
							<option value="normal">Normal</option>
							<option value="dificil">Difícil</option>
							<option value="chucknorris">Chuck Norris</option>
						</select>

					</div>

				</div>

			</div>
		</div>


		<div class="row">
			<div class="col">
				<div class="d-flex justify-content-center">
					<button type="button" class="btn btn-danger btn-lg" onclick="iniciarJogo()">

						Iniciar Jogo

					</button>
				</div>
			</div>
		</div>

	</div>

</body>

</html>
